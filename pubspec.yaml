name: calorie_calculator
description: 사진으로 음식 칼로리를 계산해주는 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  image_picker: ^1.1.2
  google_generative_ai: ^0.4.6
  google_mlkit_image_labeling: ^0.13.0
  provider: ^6.1.2
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  path_provider: ^2.1.5
  fl_chart: ^0.69.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  uuid: ^4.5.1
  animated_text_kit: ^4.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
